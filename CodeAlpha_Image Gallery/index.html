<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Gallery | CodeAlpha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1>Interactive Image Gallery</h1>
        
        <div class="filter-buttons">
            <button class="btn active" data-filter="all">All</button>
            <button class="btn" data-filter="nature">Nature</button>
            <button class="btn" data-filter="cars">Cars</button>
            <button class="btn" data-filter="tech">Technology</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=500&q=80" alt="Nature 1">
                <div class="overlay"><span>Nature View</span></div>
            </div>
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=500&q=80" alt="Nature 2">
                <div class="overlay"><span>Green Valley</span></div>
            </div>

            <div class="gallery-item" data-category="cars">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=500&q=80" alt="Car 1">
                <div class="overlay"><span>Sports Car</span></div>
            </div>
            <div class="gallery-item" data-category="cars">
                <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=500&q=80" alt="Car 2">
                <div class="overlay"><span>Modern Wheels</span></div>
            </div>

            <div class="gallery-item" data-category="tech">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=500&q=80" alt="Tech 1">
                <div class="overlay"><span>Cyber Circuit</span></div>
            </div>
            <div class="gallery-item" data-category="tech">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=500&q=80" alt="Tech 2">
                <div class="overlay"><span>Coding Setup</span></div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <span class="prev-btn">&#10094;</span>
        <img class="lightbox-img" src="" alt="Enlarged Image">
        <span class="next-btn">&#10095;</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
